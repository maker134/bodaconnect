# Mosquitto MQTT Broker Configuration
# BodaConnect Real-Time Communication

# Listen on port 1883 for MQTT connections
listener 1883

# Listen on port 9001 for WebSocket connections
listener 9001
protocol websockets

# Allow connections without username/password
allow_anonymous true

# Log settings
log_dest stdout
log_type all

# Persistence
persistence true
persistence_location /mosquitto/data/