<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Register - BodaConnect</title>
    <link rel="stylesheet" href="/static/style.css">
</head>
<body>
<nav>
    <a class="nav-brand" href="/">🏍️ BodaConnect</a>
    <div class="nav-links">
        <a href="/login">Login</a>
    </div>
</nav>

<div class="flash-container">
    {% with messages = get_flashed_messages(with_categories=true) %}
        {% for category, message in messages %}
            <div class="flash {{ category }}">{{ message }}</div>
        {% endfor %}
    {% endwith %}
</div>

<div class="container-sm">
    <div class="card">
        <h2>Create Account</h2>
        <form method="POST">
            <div class="form-row">
                <div class="form-group">
                    <label>First Name</label>
                    <input type="text" name="first_name" required>
                </div>
                <div class="form-group">
                    <label>Last Name</label>
                    <input type="text" name="last_name" required>
                </div>
            </div>
            <div class="form-group">
                <label>Email Address</label>
                <input type="email" name="email" required>
            </div>
            <div class="form-group">
                <label>Phone Number</label>
                <input type="tel" name="phone" required>
            </div>
            <div class="form-group">
                <label>Password</label>
                <input type="password" name="password" required>
            </div>
            <div class="form-group">
                <label>I am a...</label>
                <select name="role" required>
                    <option value="">-- Select Role --</option>
                    <option value="customer">Customer (I want to book rides)</option>
                    <option value="rider">Boda Rider (I want to offer rides)</option>
                </select>
            </div>
            <button type="submit" class="btn btn-primary" style="width:100%; border-radius:8px;">Create Account</button>
        </form>
        <div class="form-footer">
            Already have an account? <a href="/login">Login here</a>
        </div>
    </div>
</div>
</body>
</html>
