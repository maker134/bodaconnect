<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Rider Dashboard</title>
    <link rel="stylesheet" href="/static/style.css">
</head>
<body>
    <nav>
        <h1>🏍️ BodaConnect</h1>
        <a href="/">Home</a>
        <a href="/request-ride">Request a Ride</a>
    </nav>
    <div class="dashboard">
        <h2>Rider Dashboard</h2>
        {% if rides %}
        <table>
            <tr>
                <th>#</th>
                <th>Customer</th>
                <th>Pickup</th>
                <th>Destination</th>
                <th>Status</th>
            </tr>
            {% for ride in rides %}
            <tr>
                <td>{{ ride[0] }}</td>
                <td>{{ ride[1] }}</td>
                <td>{{ ride[2] }}</td>
                <td>{{ ride[3] }}</td>
                <td><span class="status">{{ ride[4] }}</span></td>
            </tr>
            {% endfor %}
        </table>
        {% else %}
        <p>No rides yet. Waiting for requests...</p>
        {% endif %}
    </div>
</body>
</html>
