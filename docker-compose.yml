services:

  # ── Web Server (Nginx) ──────────────────────────
  nginx:
    image: nginx:latest
    container_name: nginx
    ports:
      - "80:80"
    volumes:
      - type: bind
        source: ./nginx/default.conf
        target: /etc/nginx/conf.d/default.conf
    depends_on:
      - web
    networks:
      - bodaconnect-network
    restart: always

  # ── Flask App ───────────────────────────────────
  web:
    build: .
    container_name: flask-app
    expose:
      - "5000"
    volumes:
      - .:/app
    depends_on:
      - db
    environment:
      - DATABASE_URL=postgresql://bodauser:bodapass@db:5432/bodaconnect
    networks:
      - bodaconnect-network
    restart: always

  # ── PostgreSQL Database ─────────────────────────
  db:
    image: postgres:15
    container_name: postgres-db
    environment:
      - POSTGRES_USER=bodauser
      - POSTGRES_PASSWORD=bodapass
      - POSTGRES_DB=bodaconnect
    volumes:
      - postgres-data:/var/lib/postgresql/data
    ports:
      - "5433:5432"
    networks:
      - bodaconnect-network
    restart: always

  # ── Node Exporter ───────────────────────────────
  node-exporter:
    image: prom/node-exporter:latest
    container_name: node-exporter
    restart: always
    ports:
      - "9100:9100"
    networks:
      - monitoring-network

  # ── Prometheus ──────────────────────────────────
  prometheus:
    image: prom/prometheus:latest
    container_name: prometheus
    restart: always
    ports:
      - "9090:9090"
    volumes:
      - ./monitoring/prometheus.yml:/etc/prometheus/prometheus.yml
    networks:
      - monitoring-network

  # ── Grafana ─────────────────────────────────────
  grafana:
    image: grafana/grafana:latest
    container_name: grafana
    restart: always
    ports:
      - "3001:3000"
    environment:
      - GF_SECURITY_ADMIN_USER=admin
      - GF_SECURITY_ADMIN_PASSWORD=admin123
    networks:
      - monitoring-network

networks:
  bodaconnect-network:
    driver: bridge
  monitoring-network:
    driver: bridge

volumes:
  postgres-data: