name: BodaConnect CI Pipeline

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  test:
    name: Run Tests
    runs-on: ubuntu-latest

    # Spins up a temporary PostgreSQL database on GitHub's server
    # Without this, tests fail because there's no database to connect to
    services:
      postgres:
        image: postgres:15
        env:
          POSTGRES_USER: bodauser
          POSTGRES_PASSWORD: bodapass
          POSTGRES_DB: bodaconnect
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    env:
      DATABASE_URL: postgresql://bodauser:bodapass@localhost:5432/bodaconnect
      MQTT_BROKER: localhost
      MQTT_PORT: "1883"

    steps:
      - name: Checkout code
        uses: actions/checkout@v3

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      # Pipeline stops here if any test fails — nothing gets built or pushed
      - name: Run tests
        run: |
          python -m pytest tests/ -v

  build-and-push:
    name: Build & Push Docker Image
    runs-on: ubuntu-latest
    needs: test

    steps:
      - name: Checkout code
        uses: actions/checkout@v3

      - name: Log in to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_PASSWORD }}

      - name: Get short SHA
        id: vars
        run: echo "sha_short=$(git rev-parse --short HEAD)" >> $GITHUB_OUTPUT

      - name: Build Docker image
        run: |
          docker build -t maker678/bodaconnect:latest \
                       -t maker678/bodaconnect:v1.0 \
                       -t maker678/bodaconnect:${{ steps.vars.outputs.sha_short }} .

      - name: Push Docker image to Docker Hub
        run: |
          docker push maker678/bodaconnect:latest
          docker push maker678/bodaconnect:v1.0
          docker push maker678/bodaconnect:${{ steps.vars.outputs.sha_short }}