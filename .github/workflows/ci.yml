name: BodaConnect CI Pipeline

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  test:
    name: Run Tests
    runs-on: ubuntu-latest

    # This spins up a real PostgreSQL database on the GitHub runner
    # Think of it as a temporary database just for running tests
    services:
      postgres:
        image: postgres:15
        env:
          POSTGRES_USER: bodauser
          POSTGRES_PASSWORD: bodapass
          POSTGRES_DB: bodaconnect
        ports:
          - 5432:5432
        # Wait until PostgreSQL is ready before running tests
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    # These environment variables are available to your tests
    env:
      DATABASE_URL: postgresql://bodauser:bodapass@localhost:5432/bodaconnect
      MQTT_BROKER: localhost
      MQTT_PORT: "1883"

    steps:
      - name: Checkout code
        uses: actions/checkout@v3

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.11'

      # Install all dependencies from requirements.txt
      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      # Run your tests — pipeline stops here if any test fails
      - name: Run tests
        run: |
          python -m pytest tests/ -v

  build-and-push:
    name: Build & Push Docker Image
    runs-on: ubuntu-latest
    needs: test  # Only runs if tests pass

    steps:
      - name: Checkout code
        uses: actions/checkout@v3

      # Log into Docker Hub using your GitHub secrets
      - name: Log in to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_PASSWORD }}

      # Get short commit SHA for unique image tagging
      - name: Get short SHA
        id: vars
        run: echo "sha_short=$(git rev-parse --short HEAD)" >> $GITHUB_OUTPUT

      # Build image with 3 tags: latest, v1.0, and commit SHA
      - name: Build Docker image
        run: |
          docker build -t maker678/bodaconnect:latest \
                       -t maker678/bodaconnect:v1.0 \
                       -t maker678/bodaconnect:${{ steps.vars.outputs.sha_short }} .

      # Push all 3 tags to Docker Hub
      - name: Push Docker image to Docker Hub
        run: |
          docker push maker678/bodaconnect:latest
          docker push maker678/bodaconnect:v1.0
          docker push maker678/bodaconnect:${{ steps.vars.outputs.sha_short }}