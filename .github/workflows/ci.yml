name: BodaConnect CI Pipeline

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  test:
    name: Run Tests
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v3

      # This downloads your project code from GitHub onto the runner machine
      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.11'

      # Installs all your Flask app dependencies from requirements.txt
      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      # Runs your test files inside the tests/ folder
      # If ANY test fails, the entire pipeline stops here — nothing gets built or pushed
      - name: Run tests
        run: |
          python -m pytest tests/ -v

  build-and-push:
    name: Build & Push Docker Image
    runs-on: ubuntu-latest
    needs: test  # This job only runs if the test job above passes

    steps:
      - name: Checkout code
        uses: actions/checkout@v3

      # Logs into your Docker Hub account using secrets you set in GitHub
      # This is like typing "docker login" but automated and secure
      - name: Log in to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_PASSWORD }}

      # Reads the current git commit short hash (e.g. a1b2c3d)
      # We use this to tag the image uniquely per commit
      - name: Get short SHA
        id: vars
        run: echo "sha_short=$(git rev-parse --short HEAD)" >> $GITHUB_OUTPUT

      # Builds your Docker image and tags it THREE ways:
      # 1. latest        → always points to the newest version
      # 2. v1.0          → a fixed release version
      # 3. commit SHA    → unique tag per code push (useful for rollback)
      - name: Build Docker image
        run: |
          docker build -t maker678/bodaconnect:latest \
                       -t maker678/bodaconnect:v1.0 \
                       -t maker678/bodaconnect:${{ steps.vars.outputs.sha_short }} .

      # Pushes all three tags to Docker Hub
      # After this step, your image is publicly available at hub.docker.com/r/maker678/bodaconnect
      - name: Push Docker image to Docker Hub
        run: |
          docker push maker678/bodaconnect:latest
          docker push maker678/bodaconnect:v1.0
          docker push maker678/bodaconnect:${{ steps.vars.outputs.sha_short }}