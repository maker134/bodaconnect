name: BodaConnect CI Pipeline

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  test:
    name: Run Tests
    runs-on: ubuntu-latest

    services:
      postgres:
        image: postgres:15
        env:
          POSTGRES_USER: bodauser
          POSTGRES_PASSWORD: bodapass
          POSTGRES_DB: bodaconnect
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install flask flask-login werkzeug psycopg2-binary pytest

      - name: Wait for PostgreSQL
        run: |
          until pg_isready -h localhost -p 5432; do
            echo "Waiting for postgres..."
            sleep 2
          done

      - name: Initialize database
        env:
          DATABASE_URL: postgresql://bodauser:bodapass@localhost:5432/bodaconnect
        run: |
          python -c "
          import psycopg2
          from werkzeug.security import generate_password_hash
          conn = psycopg2.connect('postgresql://bodauser:bodapass@localhost:5432/bodaconnect')
          c = conn.cursor()
          c.execute('''CREATE TABLE IF NOT EXISTS users (
              id SERIAL PRIMARY KEY,
              first_name TEXT NOT NULL,
              last_name TEXT NOT NULL,
              email TEXT UNIQUE NOT NULL,
              phone TEXT NOT NULL,
              password TEXT NOT NULL,
              role TEXT NOT NULL DEFAULT 'customer'
          )''')
          c.execute('''CREATE TABLE IF NOT EXISTS rides (
              id SERIAL PRIMARY KEY,
              customer_id INTEGER NOT NULL REFERENCES users(id),
              rider_id INTEGER REFERENCES users(id),
              pickup TEXT NOT NULL,
              destination TEXT NOT NULL,
              customer_phone TEXT NOT NULL,
              status TEXT DEFAULT 'pending',
              created_at TIMESTAMP DEFAULT CURRENT_TIMESTAMP
          )''')
          conn.commit()
          conn.close()
          print('Database initialized!')
          "

      - name: Run tests
        env:
          DATABASE_URL: postgresql://bodauser:bodapass@localhost:5432/bodaconnect
        run: |
          pytest tests/ -v

  build:
    name: Build Docker Image
    runs-on: ubuntu-latest
    needs: test

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Build Docker image
        run: |
          docker build -t bodaconnect:latest .
          docker build -t bodaconnect:v1 .

      - name: Verify Docker image
        run: |
          docker images | grep bodaconnect
          echo "Docker image built successfully!"