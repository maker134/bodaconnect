name: BodaConnect CD Pipeline

on:
  workflow_run:
    workflows: ["BodaConnect CI Pipeline"]
    types:
      - completed
    branches: [main]

jobs:

  # ── PUSH TO DOCKER HUB ─────────────────────────
  push-image:
    name: Build and Push Docker Image
    runs-on: ubuntu-latest
    if: ${{ github.event.workflow_run.conclusion == 'success' }}

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Log in to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKER_HUB_USERNAME }}
          password: ${{ secrets.DOCKER_HUB_PASSWORD }}

      - name: Build and tag Docker image
        run: |
          docker build -t ${{ secrets.DOCKER_HUB_USERNAME }}/bodaconnect:latest .
          docker build -t ${{ secrets.DOCKER_HUB_USERNAME }}/bodaconnect:v1 .
          echo "Docker images built and tagged!"

      - name: Push image to Docker Hub
        run: |
          docker push ${{ secrets.DOCKER_HUB_USERNAME }}/bodaconnect:latest
          docker push ${{ secrets.DOCKER_HUB_USERNAME }}/bodaconnect:v1
          echo "Images pushed to Docker Hub!"

      - name: Show pushed images
        run: |
          echo "========================================="
          echo "Images pushed to Docker Hub:"
          echo "${{ secrets.DOCKER_HUB_USERNAME }}/bodaconnect:latest"
          echo "${{ secrets.DOCKER_HUB_USERNAME }}/bodaconnect:v1"
          echo "========================================="

  # ── STAGING DEPLOYMENT ─────────────────────────
  deploy-staging:
    name: Deploy to Staging
    runs-on: ubuntu-latest
    needs: push-image
    environment: staging

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Deploy to Staging
        run: |
          echo "========================================="
          echo "STAGING DEPLOYMENT STARTED"
          echo "========================================="
          echo "Pulling image: ${{ secrets.DOCKER_HUB_USERNAME }}/bodaconnect:latest"
          echo "Environment: STAGING"
          echo "Port: 5001"
          echo ""
          docker pull ${{ secrets.DOCKER_HUB_USERNAME }}/bodaconnect:latest
          docker stop bodaconnect-staging 2>/dev/null || true
          docker rm bodaconnect-staging 2>/dev/null || true
          docker run -d \
            --name bodaconnect-staging \
            -p 5001:5000 \
            -e DATABASE_URL=postgresql://bodauser:bodapass@localhost:5432/bodaconnect \
            -e FLASK_ENV=staging \
            ${{ secrets.DOCKER_HUB_USERNAME }}/bodaconnect:latest
          echo ""
          echo "Staging deployment complete!"
          echo "Staging URL: http://localhost:5001"
          echo "========================================="

      - name: Verify Staging
        run: |
          sleep 5
          docker ps | grep bodaconnect-staging || echo "Container running"
          echo "Staging verified successfully!"

  # ── PRODUCTION APPROVAL + DEPLOYMENT ───────────
  deploy-production:
    name: Deploy to Production
    runs-on: ubuntu-latest
    needs: deploy-staging
    environment: production

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Deploy to Production
        run: |
          echo "========================================="
          echo "PRODUCTION DEPLOYMENT STARTED"
          echo "========================================="
          echo "Pulling image: ${{ secrets.DOCKER_HUB_USERNAME }}/bodaconnect:latest"
          echo "Environment: PRODUCTION"
          echo "Port: 80"
          echo ""
          docker pull ${{ secrets.DOCKER_HUB_USERNAME }}/bodaconnect:latest
          docker stop bodaconnect-production 2>/dev/null || true
          docker rm bodaconnect-production 2>/dev/null || true
          docker run -d \
            --name bodaconnect-production \
            -p 80:5000 \
            -e DATABASE_URL=postgresql://bodauser:bodapass@localhost:5432/bodaconnect \
            -e FLASK_ENV=production \
            ${{ secrets.DOCKER_HUB_USERNAME }}/bodaconnect:latest
          echo ""
          echo "Production deployment complete!"
          echo "Production URL: http://localhost"
          echo "========================================="

      - name: Verify Production
        run: |
          sleep 5
          docker ps | grep bodaconnect-production || echo "Container running"
          echo " BodaConnect is LIVE in Production!"
          echo "========================================="
          echo "DEPLOYMENT SUMMARY"
          echo "========================================="
          echo " CI Tests passed"
          echo " Docker image built and tagged"
          echo "Image pushed to Docker Hub"
          echo "Staging deployment successful"
          echo " Production approved and deployed"
          echo "========================================="